name: Staging Model Deployment for yang-mlops-project-0912
'on':
  workflow_dispatch:
    inputs:
      modelUri:
        type: string
        description: URI of model to deploy, in the format models:/<model-name>/<version-id>
        required: true
env:
  DATABRICKS_HOST: https://adb-8405830731420074.14.azuredatabricks.net
  NODE_TYPE_ID: Standard_D3_v2
jobs:
  staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
    - name: Checkout repo
      uses: actions/checkout@v3
    - name: Generate AAD Token
      run: ./.github/workflows/scripts/generate-aad-token.sh ${{ secrets.STAGING_AZURE_SP_TENANT_ID
        }} ${{ secrets.STAGING_AZURE_SP_APPLICATION_ID }} ${{ secrets.STAGING_AZURE_SP_CLIENT_SECRET
        }}
    - name: Deploy model
      env:
        MLFLOW_TRACKING_URI: databricks
      run: 'pip install mlflow

        python steps/deploy.py "${{ github.event.inputs.modelUri }}" "staging"

        '
